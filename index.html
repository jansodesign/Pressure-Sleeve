<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi-Touch Interaction Design WebAR</title>
    <!-- Load critical A-Frame 3D engine and MindAR tracking frameworks -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
  </head>
  <body>
    <!-- 1. The Core AR Scene Container -->
    <a-scene mindar-image="imageTargetSrc: ./poster-target.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      
      
        <!-- 3D visual markers will be spawned inside here automatically by JavaScript -->
      
    </a-scene>

    <!-- 3. Dynamic Wireless Multi-Touch Handler -->
    <script>
      const anchorNode = document.querySelector('#arAnchor');
let activeVisuals = {}; 

// Updated to match your exact Glitch name from your Arduino sketch
const GLITCH_PROJECT_NAME = "pressure-sleeve-server"; 
const socket = new WebSocket(`wss://://${GLITCH_PROJECT_NAME}.onrender.com`);

socket.onmessage = (event) => {
  const data = JSON.parse(event.data);
  if (!data.touches) return;

  let activeKeysInCurrentFrame = new Set();

  data.touches.forEach((touch) => {
    const touchID = `r${touch.r}c${touch.c}`;
    activeKeysInCurrentFrame.add(touchID);

    // FIXED MATH FOR YOUR 5x6 MATRIX:
    // Columns (0 to 5): Centered by subtracting 2.5, spread apart by 0.07 units
    let targetX = (touch.c - 2.5) * 0.07; 
    // Rows (0 to 4): Centered by subtracting 2, spread apart by 0.07 units
    let targetY = (touch.r - 2) * 0.07; 
    
    let targetHeight = (touch.p / 127.0) * 0.4; 

    if (!activeVisuals[touchID]) {
      const newBox = document.createElement('a-box');
      newBox.setAttribute('id', touchID);
      newBox.setAttribute('width', '0.05');
      newBox.setAttribute('depth', '0.05');
      newBox.setAttribute('color', '#FF2D55'); 
      
      anchorNode.appendChild(newBox);
      activeVisuals[touchID] = newBox;
    }

    activeVisuals[touchID].setAttribute('height', targetHeight);
    activeVisuals[touchID].setAttribute('position', `${targetX} ${targetY} ${targetHeight / 2}`);
  });

  // Garbage Collection
  Object.keys(activeVisuals).forEach((key) => {
    if (!activeKeysInCurrentFrame.has(key)) {
      activeVisuals[key].parentNode.removeChild(activeVisuals[key]);
      delete activeVisuals[key];
    }
  });
};

socket.onerror = (error) => console.log('WebSocket Wireless Drop Error:', error);

    </script>
  </body>
</html>
